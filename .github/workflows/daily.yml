name: Daily HackerNews

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  get_top_stories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run digest
        run: python main.py
        env:
          ACCESS_TOKEN: ${{ secrets.SECRET }}